name: style

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  ruff:
    runs-on: [self-hosted, dfair-gha-runner]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.11

      - name: Show Python
        run: |
          uv python list 3.11
          which uv

      - name: Sync dependencies
        run: uv sync --python 3.11

      - name: Ruff format (check)
        run: uv run --python 3.11 ruff format --check .

      - name: Ruff lint
        run: uv run --python 3.11 ruff check .