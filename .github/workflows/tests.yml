name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pytest:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: [self-hosted, linux, x64, dfair-gha-runner]
            python-version: "3.11"
          - runner: macos-latest
            python-version: "3.11"

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        env:
          OMP_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
          VECLIB_MAXIMUM_THREADS: "1"
          NUMEXPR_NUM_THREADS: "1"
          OPENBLAS_NUM_THREADS: "1"
        run: uv run pytest -q